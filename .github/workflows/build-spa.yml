name: Build and Deploy SPA

on:
  push:
    branches: [main]
    paths:
      - 'spa-project/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spa-project/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: spa-project

      - name: Build
        run: npm run build
        working-directory: spa-project

      - name: Update spa/ folder
        run: |
          rm -rf spa
          cp -r spa-project/dist spa

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spa/
          git diff --staged --quiet || git commit -m "Auto build: update spa/"
          git push
