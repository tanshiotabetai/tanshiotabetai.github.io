<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPAページ</title>
</head>
<body>

  <nav>
    <a href="#/">トップページ</a> |
    <a href="#/page1">遷移先①</a> |
    <a href="#/page2">遷移先②</a>
  </nav>

  <hr>

  <div id="app"></div>

  <!-- 調査用ログ表示エリア -->
  <hr>
  <h3>【調査ログ】</h3>
  <div id="log" style="font-family: monospace; font-size: 13px;"></div>

  <script>
    const pages = {
      '/': `
        <h1>トップページ</h1>
        <p>トップページです。</p>
        <p>上のナビゲーションから遷移先①・②へ移動してください。</p>
      `,
      '/page1': `
        <h1>遷移先①</h1>
        <p>遷移先①のページです。</p>
      `,
      '/page2': `
        <h1>遷移先②</h1>
        <p>遷移先②のページです。</p>
      `,
    };

    function addLog(message) {
      var logDiv = document.getElementById('log');
      var time = new Date().toLocaleTimeString('ja-JP');
      logDiv.innerHTML += time + ' - ' + message + '<br>';
    }

    function render() {
      var hash = location.hash.slice(1) || '/';
      var content = pages[hash] || '<h1>ページが見つかりません</h1>';
      document.getElementById('app').innerHTML = content;
      addLog('ページ遷移: ' + (location.hash || '#/（トップ）'));
    }

    window.addEventListener('hashchange', render);
    render();

    addLog('ページ読み込み完了');
  </script>

</body>
</html>
