<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuzen調査用 SPAページ</title>

  <!-- Kuzenタグ -->
  <script>
  window.kuzenTagAsyncInit = function() {
      window.kuzen_tag.add_query_parameter_url([]);
  };
  (function() {
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = 'https://tag-v2.kuzen.io?tracking_code=KT_ZuChnGnT3Zp4aA%3D%3D248&line=1';
      script.async = true;
      document.head.appendChild(script);
  })();
  </script>
</head>
<body>

  <nav>
    <a href="#/">トップページ</a> |
    <a href="#/page1">遷移先①</a> |
    <a href="#/page2">遷移先②</a>
  </nav>

  <hr>

  <div id="app"></div>

  <!-- 調査用ログ表示エリア -->
  <hr>
  <h3>【調査ログ】</h3>
  <div id="log" style="font-family: monospace; font-size: 13px;"></div>

  <script>
    const pages = {
      '/': `
        <h1>トップページ</h1>
        <p>Kuzen調査用のトップページです。</p>
        <p>上のナビゲーションから遷移先①・②へ移動してください。</p>
      `,
      '/page1': `
        <h1>遷移先①</h1>
        <p>SPA遷移先①のページです。</p>
        <p>Kuzenタグが再発火しているか調査してください。</p>
      `,
      '/page2': `
        <h1>遷移先②</h1>
        <p>SPA遷移先②のページです。</p>
        <p>離脱防止ポップアップの動作も確認してください。</p>
      `,
    };

    function addLog(message) {
      var logDiv = document.getElementById('log');
      var time = new Date().toLocaleTimeString('ja-JP');
      logDiv.innerHTML += time + ' - ' + message + '<br>';
    }

    function render() {
      var hash = location.hash.slice(1) || '/';
      var content = pages[hash] || '<h1>ページが見つかりません</h1>';
      document.getElementById('app').innerHTML = content;
      addLog('ページ遷移: ' + (location.hash || '#/（トップ）'));
    }

    window.addEventListener('hashchange', render);
    render();

    addLog('ページ読み込み完了');
  </script>

</body>
</html>
